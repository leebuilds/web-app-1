<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Poll MVP — Log in</title>
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    <header class="app-header">
      <div class="container">
        <a class="brand" href="/">Poll MVP</a>
        <span class="muted">Log in</span>
      </div>
    </header>

    <main class="container" style="max-width: 480px;">
      <h1>Welcome back</h1>
      <p class="muted">Log in to manage your polls.</p>

      <div id="banner" class="banner"></div>

      <div class="card">
        <form id="login-form">
          <div class="field">
            <label for="identifier">Email or username</label>
            <input type="text" id="identifier" autocomplete="username" placeholder="you@example.com" required />
          </div>
          <div class="field">
            <label for="password">Password</label>
            <input type="password" id="password" autocomplete="current-password" placeholder="Your password" required />
          </div>
          <div class="btn-row">
            <button type="submit" class="btn btn-primary">Log in</button>
            <a class="btn btn-ghost" href="/signup.html">Create an account</a>
          </div>
        </form>
      </div>
    </main>

    <script src="/js/auth.js"></script>
    <script src="/js/login.js"></script>
  </body>
</html>
