<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Poll MVP — Vote</title>
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    <header class="app-header">
      <div class="container">
        <a class="brand" href="/">Poll MVP</a>
        <span class="muted">Vote</span>
      </div>
    </header>

    <main class="container">
      <div id="banner" class="banner"></div>

      <div class="card" id="poll-card">
        <h1 id="poll-title">Loading poll…</h1>
        <p class="muted" id="poll-description"></p>

        <form id="vote-form">
          <div id="options"></div>
          <div class="btn-row">
            <button type="submit" class="btn btn-primary" id="submit-vote">Submit vote</button>
            <a class="btn btn-secondary" id="results-link" href="#">View results</a>
          </div>
        </form>
      </div>
    </main>

    <script src="/js/poll.js"></script>
  </body>
</html>
