<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Poll MVP — Sign up</title>
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    <header class="app-header">
      <div class="container">
        <a class="brand" href="/">Poll MVP</a>
        <span class="muted">Create account</span>
      </div>
    </header>

    <main class="container" style="max-width: 480px;">
      <h1>Create your account</h1>
      <p class="muted">Sign up to create and manage your polls.</p>

      <div id="banner" class="banner"></div>

      <div class="card">
        <form id="signup-form">
          <div class="field">
            <label for="email">Email</label>
            <input type="text" id="email" autocomplete="email" placeholder="you@example.com" required />
          </div>
          <div class="field">
            <label for="username">Username (unique)</label>
            <input type="text" id="username" autocomplete="username" placeholder="jane_doe" required />
          </div>
          <div class="field">
            <label for="displayName">Display name</label>
            <input type="text" id="displayName" placeholder="Jane Doe" required />
          </div>
          <div class="field">
            <label for="password">Password</label>
            <input type="password" id="password" autocomplete="new-password" placeholder="At least 8 characters" required />
          </div>
          <div class="btn-row">
            <button type="submit" class="btn btn-primary">Sign up</button>
            <a class="btn btn-ghost" href="/login.html">I already have an account</a>
          </div>
        </form>
      </div>
    </main>

    <script src="/js/auth.js"></script>
    <script src="/js/signup.js"></script>
  </body>
</html>
